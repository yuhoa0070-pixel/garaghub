<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    GarageHub navbar icon set
    - 24x24 viewBox per icon
    - stroke-based, no fills (inherits currentColor)
    - stroke-width 1.75, round caps/joins for a soft, modern feel
    - use like: <svg class="nav-icon"><use href="navbar-icons.svg#icon-dashboard"/></svg>
  -->
  <defs>
    <g id="icon-base"></g>
  </defs>

  <symbol id="icon-dashboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="8" height="8" rx="2"/>
    <rect x="13" y="3" width="8" height="5" rx="2"/>
    <rect x="13" y="10" width="8" height="11" rx="2"/>
    <rect x="3" y="13" width="8" height="8" rx="2"/>
  </symbol>

  <symbol id="icon-customers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="17" cy="7.5" r="2.3"/>
    <rect x="13.2" y="12.3" width="7.6" height="7.2" rx="3.5"/>
    <circle cx="9" cy="8" r="3"/>
    <rect x="4.5" y="13.3" width="9" height="7.7" rx="4.5"/>
  </symbol>

  <symbol id="icon-vehicles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.5 16.5 5 11.2a2 2 0 0 1 1.9-1.45h10.2A2 2 0 0 1 19 11.2l1.5 5.3"/>
    <path d="M7.2 9.75 8.4 7a2 2 0 0 1 1.85-1.25h3.5A2 2 0 0 1 15.6 7l1.2 2.75"/>
    <path d="M3.5 16.5h17v2a1 1 0 0 1-1 1h-1.5a1 1 0 0 1-1-1v-1h-11v1a1 1 0 0 1-1 1H3.5a1 1 0 0 1-1-1z"/>
    <circle cx="7.5" cy="16.5" r="1.6"/>
    <circle cx="16.5" cy="16.5" r="1.6"/>
  </symbol>

  <symbol id="icon-repair-orders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="4.5" width="14" height="16.5" rx="2"/>
    <rect x="9" y="2.5" width="6" height="3" rx="1"/>
    <path d="M8.2 11h3.3"/>
    <path d="M8.2 15.5 9.6 17l2.6-3"/>
    <path d="M14.5 15.8h1.3"/>
  </symbol>

  <symbol id="icon-invoices" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3h12v16.5l-1.5-1.3-1.5 1.3-1.5-1.3-1.5 1.3-1.5-1.3-1.5 1.3-1.5-1.3-1.5 1.3V3z"/>
    <path d="M9 8.2h6"/>
    <path d="M9 11.8h6"/>
    <path d="M9 15.4h3.5"/>
  </symbol>

  <symbol id="icon-inventory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3.2 19.5 7.4v9.2L12 20.8l-7.5-4.2V7.4z"/>
    <path d="M4.5 7.4 12 11.6l7.5-4.2"/>
    <path d="M12 11.6v9.2"/>
  </symbol>

  <symbol id="icon-staff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="4.6" cy="9.3" r="1.9"/>
    <rect x="1.8" y="13" width="5.6" height="6" rx="2.8"/>
    <circle cx="19.4" cy="9.3" r="1.9"/>
    <rect x="16.6" y="13" width="5.6" height="6" rx="2.8"/>
    <circle cx="12" cy="7.2" r="3"/>
    <rect x="7.5" y="12" width="9" height="8" rx="4.5"/>
  </symbol>

  <symbol id="icon-reminders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 15.8v-4.3a6 6 0 0 1 12 0v4.3l1.6 2.4H4.4z"/>
    <path d="M10.2 21a1.9 1.9 0 0 0 3.6 0"/>
  </symbol>

  <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 3.5v2.2"/>
    <path d="M12 18.3v2.2"/>
    <path d="M20.5 12h-2.2"/>
    <path d="M5.7 12H3.5"/>
    <path d="M17.9 6.1l-1.55 1.55"/>
    <path d="M7.65 16.35 6.1 17.9"/>
    <path d="M17.9 17.9l-1.55-1.55"/>
    <path d="M7.65 7.65 6.1 6.1"/>
  </symbol>
</svg>
